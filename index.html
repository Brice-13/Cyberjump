<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: Retro Arcade</title>
    <style>
        /* Base page resetting */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
            color: #ecf0f1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            background: #1f2833;
            border: 4px solid #45f3ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #45f3ff44;
            display: flex;
            flex-direction: column;
        }

        #mobile-controls {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        #mobile-controls button {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            outline: none;
            cursor: pointer;
        }

        #mobile-controls button:active {
            background-color: rgba(0, 255, 204, 0.5);
            color: #fff;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.8);
        }

        canvas {
            width: 100%;
            flex-grow: 1;
            background: radial-gradient(circle, #151b24 0%, #0b0c10 100%);
            display: block;
        }

        /* Overlay UI Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 12, 16, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            color: #45f3ff;
            text-shadow: 0 0 10px #45f3ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #66fcf1;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .menu-btn {
            background: transparent;
            border: 2px solid #45f3ff;
            color: #45f3ff;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            box-shadow: 0 0 10px #45f3ff22;
            margin: 10px 0;
            width: 80%;
        }

        .menu-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 15px #45f3ff;
        }

        .stats-box {
            border: 1px solid #1f2833;
            background: #151b24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 80%;
        }

        .hide {
            display: none !important;
        }

        /* Wardrobe Shop CSS */
        .shop-container {
            width: 90%;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: #151b24;
            border: 1px solid #45f3ff33;
            margin: 6px 0;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .shop-item.owned {
            border-color: #66fcf1;
        }

        .shop-btn {
            padding: 4px 10px;
            font-size: 0.8rem;
            width: auto;
            margin: 0;
            background: transparent;
            border: 2px solid #45f3ff;
            color: #45f3ff;
            cursor: pointer;
        }

        .shop-preview-canvas {
            background: #0b0c10;
            border: 1px solid #1f2833;
            border-radius: 3px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- MAIN MENU -->
    <div id="menu-screen" class="overlay">
        <h1>CyberJump</h1>
        <div class="subtitle">// Initializing Cybernetic Jumper...</div>
        
        <div class="stats-box">
            <div>HIGH SCORE: <span id="high-score-val">0</span></div>
            <div style="margin-top: 5px;">CHIPS BALANCE: <span id="chips-total-val" style="color:#66fcf1;">0</span></div>
        </div>

        <button id="play-btn" class="menu-btn">ENTER CYBERSPACE</button>
        <button id="shop-btn-menu" class="menu-btn">CHARACTER WARDROBE</button>
    </div>

    <!-- SKIN SHOP -->
    <div id="shop-screen" class="overlay hide">
        <h1>Wardrobe</h1>
        <div class="subtitle">Exchange Chips for modified digital avatars</div>
        
        <div style="margin-bottom: 10px; font-weight: bold;">
            Data Chips Available: <span id="shop-chips-val" style="color:#66fcf1;">0</span>
        </div>

        <div class="shop-container" id="shop-items-list">
            <!-- Items injected via JS -->
        </div>

        <button id="close-shop-btn" class="menu-btn" style="border-color: #ff4545; color: #ff4545;">CLOSE WARDROBE</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="overlay hide">
        <h1 style="color: #ff4545; text-shadow: 0 0 10px #ff4545;">DESYNCHRONIZED</h1>
        <div class="subtitle" id="fail-reason">Jumper lost terminal connection.</div>
        
        <div class="stats-box">
            <div>ALTITUDE REACHED: <span id="final-score-val">0</span></div>
            <div>CHIPS SECURED: <span id="collected-chips-val" style="color:#66fcf1;">0</span></div>
        </div>

        <button id="retry-btn" class="menu-btn">RESPAWN AVATAR</button>
        <button id="exit-btn" class="menu-btn">RETURN TO SECTOR 0</button>
    </div>

    <!-- Canvas Game Port -->
    <canvas id="gameCanvas"></canvas>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls" class="hide">
        <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 400;
    canvas.height = 600;

    // Game state variables
    let gameActive = false;
    let score = 0;
    let totalChips = parseInt(localStorage.getItem('cyberjump_chips')) || 0;
    let highScore = parseInt(localStorage.getItem('cyberjump_highscore')) || 0;
    
    // --- CUSTOM PIXEL ART MATRICES (8x8 retro characters) ---
    const jumperSprites = {
        default: [
            "...XX...",
            "..XXXX..",
            "..X..X..",
            ".XXXXXX.",
            "XX.XX.XX",
            "..XXXX..",
            "..X..X..",
            ".XX..XX."
        ],
        green: [
            "..XXXX..",
            ".XXXXXX.",
            ".X.XX.X.",
            "XXXXXXXX",
            "XXXXXXXX",
            ".XXXXXX.",
            "..XXXX..",
            ".XX..XX."
        ],
        purple: [
            "...XX...",
            "..XXXX..",
            ".XXXXXX.",
            "XX.XX.XX",
            "XXXXXXXX",
            "..XXXX..",
            ".XX..XX.",
            "XX....XX"
        ],
        gold: [
            "..XXXX..",
            ".XXXXXX.",
            "XXXXXXXX",
            ".X.XX.X.",
            "XXXXXXXX",
            "..XXXX..",
            "..XXXX..",
            ".XXX.XXX."
        ]
    };

    let skins = [
        { id: 'default', name: 'Neon Runner', color: '#45f3ff', spriteId: 'default', price: 0, owned: true },
        { id: 'green', name: 'Cyber Suit', color: '#39ff14', spriteId: 'green', price: 50, owned: false },
        { id: 'purple', name: 'Void Astronaut', color: '#b026ff', spriteId: 'purple', price: 100, owned: false },
        { id: 'gold', name: 'Golden Android', color: '#ffd700', spriteId: 'gold', price: 250, owned: false }
    ];

    const savedSkins = JSON.parse(localStorage.getItem('cyberjump_skins'));
    if (savedSkins) {
        skins = savedSkins;
    }
    let selectedSkin = localStorage.getItem('cyberjump_activeskin') || 'default';

    // Player Object
    const player = {
        x: canvas.width / 2 - 14,
        y: canvas.height - 100,
        width: 28, 
        height: 32,
        vx: 0,
        vy: 0,
        speed: 6.0,
        jumpForce: -13.5, 
        gravity: 0.48,
        color: '#45f3ff',
        spriteId: 'default',
        hasShield: false // Track shield protection state
    };

    let platforms = [];
    let items = [];
    let cameraY = 0; 
    let basePlatformY = canvas.height - 40;

    // Milestone & Notification UI Tracking
    let nextMilestoneScore = 1000; 
    let milestoneAlertTimer = 0;
    let shieldBreakAlertTimer = 0;

    // Controls tracking
    const keys = { left: false, right: false };

    function updateStatsUI() {
        document.getElementById('high-score-val').textContent = highScore;
        document.getElementById('chips-total-val').textContent = totalChips;
        document.getElementById('shop-chips-val').textContent = totalChips;
    }

    // Controls listeners
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    // Touch controls setup 
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    function simulateKey(type, keyName) {
        const event = new KeyboardEvent(type, { key: keyName });
        window.dispatchEvent(event);
    }

    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); simulateKey('keydown', 'ArrowLeft'); });
    btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); simulateKey('keyup', 'ArrowLeft'); });

    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); simulateKey('keydown', 'ArrowRight'); });
    btnRight.addEventListener('touchend', (e) => { e.preventDefault(); simulateKey('keyup', 'ArrowRight'); });

    // Procedural Vector Generation
    function generatePlatforms(startY, count) {
        let y = startY;
        for (let i = 0; i < count; i++) {
            y -= Math.floor(Math.random() * 50) + 75; 
            let width = Math.max(60, 110 - (score / 150)); 
            let x = Math.random() * (canvas.width - width);
            
            platforms.push({ x, y, width, height: 12 });

            let spawnRoll = Math.random();
            // 8% chance to spawn a rare Deflector Shield Bubble item
            if (spawnRoll < 0.08) {
                items.push({
                    x: x + width / 2 - 10,
                    y: y - 28,
                    width: 20,
                    height: 20,
                    type: 'shield',
                    collected: false
                });
            } 
            // 30% chance to spawn standard chip if shield didn't spawn
            else if (spawnRoll < 0.38) {
                items.push({
                    x: x + width / 2 - 7,
                    y: y - 25,
                    width: 14,
                    height: 14,
                    type: 'chip',
                    collected: false
                });
            }
        }
    }

    // Engine Core Pixel Art Rasterizing Rule
    function drawPixelSprite(renderContext, spriteMatrix, targetX, targetY, spriteWidth, spriteHeight, primaryColor) {
        const rows = spriteMatrix.length;
        const cols = spriteMatrix[0].length;
        const pixelW = spriteWidth / cols;
        const pixelH = spriteHeight / rows;

        renderContext.fillStyle = primaryColor;
        renderContext.shadowColor = primaryColor;
        renderContext.shadowBlur = 8;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (spriteMatrix[r][c] === 'X') {
                    renderContext.fillRect(targetX + (c * pixelW), targetY + (r * pixelH), pixelW + 0.3, pixelH + 0.3);
                }
            }
        }
        renderContext.shadowBlur = 0; 
    }

    function initGame() {
        score = 0;
        cameraY = 0;
        platforms = [];
        items = [];
        nextMilestoneScore = 1000;
        milestoneAlertTimer = 0;
        shieldBreakAlertTimer = 0;
        player.hasShield = false;
        
        const activeObj = skins.find(s => s.id === selectedSkin);
        if (activeObj) {
            player.color = activeObj.color;
            player.spriteId = activeObj.spriteId;
        }

        platforms.push({ x: 0, y: basePlatformY, width: canvas.width, height: 40 });
        generatePlatforms(canvas.height - 80, 20);

        player.x = canvas.width / 2 - 14;
        player.y = canvas.height - 120;
        player.vx = 0;
        player.vy = 0;

        gameActive = true;
        document.getElementById('mobile-controls').classList.remove('hide');
        updateStatsUI();
        gameLoop();
    }

    function update() {
        if (!gameActive) return;

        if (keys.left) {
            player.vx = -player.speed;
        } else if (keys.right) {
            player.vx = player.speed;
        } else {
            player.vx *= 0.78; 
        }

        player.x += player.vx;
        player.vy += player.gravity;
        player.y += player.vy;

        if (player.x + player.width < 0) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.width;

        // Camera loop climbing matrices
        if (player.y < canvas.height / 2) {
            let diff = (canvas.height / 2) - player.y;
            cameraY += diff;
            player.y += diff;
            
            platforms.forEach(p => p.y += diff);
            items.forEach(it => it.y += diff);
            
            score += Math.floor(diff);
        }

        // Milestone point checker loops
        if (score >= nextMilestoneScore) {
            nextMilestoneScore += 1000; 
            totalChips += 100;         
            milestoneAlertTimer = 100; 
            localStorage.setItem('cyberjump_chips', totalChips);
            updateStatsUI();
        }

        // Countdown notifications
        if (milestoneAlertTimer > 0) milestoneAlertTimer--;
        if (shieldBreakAlertTimer > 0) shieldBreakAlertTimer--;

        // Collision logic landing loops
        platforms.forEach(platform => {
            if (
                player.vy > 0 && 
                player.x + player.width > platform.x &&
                player.x < platform.x + platform.width &&
                player.y + player.height >= platform.y &&
                player.y + player.height <= platform.y + 12
            ) {
                player.y = platform.y - player.height;
                player.vy = player.jumpForce; 
            }
        });

        // Item Power-Up & Collectible Collisions
        items.forEach(item => {
            if (!item.collected && 
                player.x < item.x + item.width &&
                player.x + player.width > item.x &&
                player.y < item.y + item.height &&
                player.y + player.height > item.y
            ) {
                item.collected = true;
                if (item.type === 'shield') {
                    player.hasShield = true; // Equip shield protection!
                } else {
                    totalChips++;
                    localStorage.setItem('cyberjump_chips', totalChips);
                    updateStatsUI();
                }
            }
        });

        platforms = platforms.filter(p => p.y < canvas.height + 50);
        items = items.filter(it => it.y < canvas.height + 50 && !it.collected);

        if (platforms.length < 15) {
            let highestPlatformY = Math.min(...platforms.map(p => p.y));
            generatePlatforms(highestPlatformY, 15);
        }

        // Fall handling boundary engine check
        if (player.y > canvas.height) {
            if (player.hasShield) {
                // SECOND CHANCE SAFETY NET ACTS NOW:
                player.hasShield = false;
                player.y = canvas.height / 2;
                player.vy = player.jumpForce * 1.3; // Give a massive shield-break boost upward
                shieldBreakAlertTimer = 120; // Flash the shatter notification
            } else {
                endGame();
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Platforms
        platforms.forEach(p => {
            ctx.fillStyle = '#1f2833';
            ctx.strokeStyle = '#66fcf1';
            ctx.lineWidth = 2;
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.strokeRect(p.x, p.y, p.width, p.height);
        });

        // Draw Collectible Orbs & Shields
        items.forEach(it => {
            if (!it.collected) {
                if (it.type === 'shield') {
                    // Render Glowing Deflector Item Orb
                    ctx.strokeStyle = '#ffffff';
                    ctx.fillStyle = '#45f3ff';
                    ctx.shadowColor = '#45f3ff';
                    ctx.shadowBlur = 12;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(it.x + 10, it.y + 10, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                } else {
                    // Standard Data Chip
                    ctx.fillStyle = '#ffe400';
                    ctx.shadowColor = '#ffe400';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.moveTo(it.x + it.width / 2, it.y);
                    ctx.lineTo(it.x + it.width, it.y + it.height / 2);
                    ctx.lineTo(it.x + it.width / 2, it.y + it.height);
                    ctx.lineTo(it.x, it.y + it.height / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        });

        // Draw Custom Pixel Art Character
        const matrix = jumperSprites[player.spriteId] || jumperSprites.default;
        drawPixelSprite(ctx, matrix, player.x, player.y, player.width, player.height, player.color);

        // Render Active Deflector Bubble Field around character skin
        if (player.hasShield) {
            ctx.strokeStyle = '#45f3ff';
            ctx.shadowColor = '#45f3ff';
            ctx.shadowBlur = 10;
            ctx.lineWidth = 3;
            ctx.beginPath();
            // Wrap character neatly inside an orbital circle bubble layout
            ctx.arc(player.x + player.width / 2, player.y + player.height / 2, 25, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Render Hud Notifications Overlay Text
        ctx.textAlign = 'center';
        ctx.shadowBlur = 4;
        ctx.shadowColor = '#000000';

        if (milestoneAlertTimer > 0) {
            ctx.fillStyle = milestoneAlertTimer % 10 < 5 ? '#ff3b30' : '#45f3ff';
            ctx.font = 'bold 22px "Courier New"';
            ctx.fillText("✨ MILESTONE CLEARED! ✨", canvas.width / 2, canvas.height / 3);
            ctx.font = '13px "Courier New"';
            ctx.fillStyle = '#ecf0f1';
            ctx.fillText("+100 DATA CHIPS SYNCHRONIZED", canvas.width / 2, (canvas.height / 3) + 30);
        }

        if (shieldBreakAlertTimer > 0) {
            ctx.fillStyle = '#ff3b30';
            ctx.font = 'bold 20px "Courier New"';
            ctx.fillText("💥 SHIELD SHATTERED! 💥", canvas.width / 2, canvas.height / 2.3);
            ctx.font = '13px "Courier New"';
            ctx.fillStyle = '#ecf0f1';
            ctx.fillText("DEFLECTOR DISCHARGED - FALL PREVENTED", canvas.width / 2, (canvas.height / 2.3) + 26);
        }
        ctx.shadowBlur = 0;

        // Draw Real-Time HUD Score stats panel
        ctx.fillStyle = '#ecf0f1';
        ctx.font = 'bold 16px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText(`ALTITUDE: ${score}`, 15, 30);
        ctx.fillStyle = '#ffe400';
        ctx.fillText(`CHIPS: ${totalChips}`, 15, 55);
        if (player.hasShield) {
            ctx.fillStyle = '#45f3ff';
            ctx.fillText(`🛡️ DEFLECTOR ACTIVE`, 15, 80);
        }
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('mobile-controls').classList.add('hide');

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('cyberjump_highscore', highScore);
        }

        document.getElementById('final-score-val').textContent = score;
        document.getElementById('collected-chips-val').textContent = totalChips;
        document.getElementById('gameover-screen').classList.remove('hide');
    }

    // --- WARDROBE SHOP LOGIC ---
    function populateShop() {
        const listContainer = document.getElementById('shop-items-list');
        listContainer.innerHTML = '';

        skins.forEach((skin) => {
            const row = document.createElement('div');
            row.className = `shop-item ${skin.owned ? 'owned' : ''}`;
            
            let actionBtnHtml = '';
            if (skin.owned) {
                if (skin.id === selectedSkin) {
                    actionBtnHtml = `<span style="color: #66fcf1; font-weight: bold;">ACTIVE</span>`;
                } else {
                    actionBtnHtml = `<button class="shop-btn" onclick="selectSkin('${skin.id}')">EQUIP</button>`;
                }
            } else {
                actionBtnHtml = `<button class="shop-btn" onclick="buySkin('${skin.id}')">BUY (${skin.price} C)</button>`;
            }

            row.innerHTML = `
                <div style="display: flex; align-items: center;">
                    <canvas id="preview-${skin.id}" class="shop-preview-canvas" width="24" height="24"></canvas>
                    <span>${skin.name}</span>
                </div>
                <div>${actionBtnHtml}</div>
            `;
            listContainer.appendChild(row);

            const pCanvas = document.getElementById(`preview-${skin.id}`);
            const pCtx = pCanvas.getContext('2d');
            const targetMatrix = jumperSprites[skin.spriteId];
            drawPixelSprite(pCtx, targetMatrix, 4, 2, 16, 20, skin.color);
        });
    }

    window.buySkin = function(id) {
        const skin = skins.find(s => s.id === id);
        if (skin && totalChips >= skin.price) {
            totalChips -= skin.price;
            skin.owned = true;
            localStorage.setItem('cyberjump_chips', totalChips);
            localStorage.setItem('cyberjump_skins', JSON.stringify(skins));
            selectSkin(id);
        } else {
            alert("Insufficient Core Assets. Reach higher altitudes!");
        }
    }

    window.selectSkin = function(id) {
        selectedSkin = id;
        localStorage.setItem('cyberjump_activeskin', selectedSkin);
        updateStatsUI();
        populateShop();
    }

    // Click Handlers / Navigation
    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('menu-screen').classList.add('hide');
        initGame();
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
        document.getElementById('gameover-screen').classList.add('hide');
        initGame();
    });

    document.getElementById('exit-btn').addEventListener('click', () => {
        document.getElementById('gameover-screen').classList.add('hide');
        document.getElementById('menu-screen').classList.remove('hide');
        updateStatsUI();
    });

    document.getElementById('shop-btn-menu').addEventListener('click', () => {
        document.getElementById('menu-screen').classList.add('hide');
        document.getElementById('shop-screen').classList.remove('hide');
        populateShop();
    });

    document.getElementById('close-shop-btn').addEventListener('click', () => {
        document.getElementById('shop-screen').classList.add('hide');
        document.getElementById('menu-screen').classList.remove('hide');
        updateStatsUI();
    });

    updateStatsUI();
</script>
</body>
    </html>
