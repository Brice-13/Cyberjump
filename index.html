<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid white; background: #111; }
    </style>
</head>
<body>
    <canvas id="c" width="400" height="600"></canvas>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        
        let p = { x: 200, y: 500, vy: 0 };
        let platforms = [{x: 100, y: 550, w: 200}];

        function draw() {
            ctx.clearRect(0, 0, 400, 600);
            
            // Physics
            p.vy += 0.5;
            p.y += p.vy;
            
            // Collision
            platforms.forEach(pl => {
                if (p.vy > 0 && p.y + 36 > pl.y && p.y + 36 < pl.y + 20 && p.x + 26 > pl.x && p.x < pl.x + pl.w) {
                    p.vy = -12;
                }
            });

            // Bounds
            if (p.y > 600) p.y = 0;

            // Render
            ctx.fillStyle = 'cyan';
            ctx.fillRect(p.x, p.y, 26, 36);
            ctx.fillStyle = 'green';
            platforms.forEach(pl => ctx.fillRect(pl.x, pl.y, pl.w, 10));

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
