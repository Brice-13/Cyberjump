<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: ORIGINAL</title>
    <style>
        body { margin: 0; background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 400px; height: 600px; border: 4px solid #45f3ff; }
        canvas { width: 100%; height: 100%; display: block; background: #000; }
        #ui { position: absolute; top: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); }
        button { background: #000; color: #45f3ff; border: 2px solid #45f3ff; padding: 20px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui">
            <h1>CYBERJUMP</h1>
            <button id="start">START GAME</button>
        </div>
        <canvas id="c" width="400" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        let gameActive = false, score = 0;
        let p = { x: 187, y: 500, vx: 0, vy: 0, w: 26, h: 36 };
        let platforms = [{x: 100, y: 550, w: 200, h: 10}];
        
        // Basic Input
        window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') p.vx = -5; if(e.key==='ArrowRight') p.vx = 5; });
        window.addEventListener('keyup', () => p.vx = 0);

        function loop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, 400, 600);
            
            // Physics
            p.x += p.vx;
            p.vy += 0.5;
            p.y += p.vy;

            // Collision
            platforms.forEach(pl => {
                if (p.vy > 0 && p.y + p.h > pl.y && p.y + p.h < pl.y + 20 && p.x + p.w > pl.x && p.x < pl.x + pl.w) {
                    p.vy = -12;
                }
            });

            // Wrap & Bounds
            if (p.x > 400) p.x = -p.w; else if (p.x < -p.w) p.x = 400;
            if (p.y > 600) { gameActive = false; document.getElementById('ui').style.display = 'flex'; }

            // Draw
            ctx.fillStyle = 'cyan'; ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#00ff55';
            platforms.forEach(pl => ctx.fillRect(pl.x, pl.y, pl.w, pl.h));
            
            requestAnimationFrame(loop);
        }

        document.getElementById('start').onclick = () => {
            document.getElementById('ui').style.display = 'none';
            gameActive = true; 
            loop();
        };
    </script>
</body>
</html>
