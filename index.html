<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: MAYHEM REPAIRED</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: #ecf0f1; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100vh; max-height: 700px; border: 4px solid #45f3ff; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        canvas { width: 100%; flex-grow: 1; display: block; }
        .menu-btn { background: transparent; border: 2px solid #45f3ff; color: #45f3ff; padding: 10px 25px; cursor: pointer; width: 85%; margin: 10px; font-family: inherit; font-size: 1.2rem; }
        .hide { display: none !important; }
        #mobile-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 100; }
        #mobile-controls button { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,0.5); color: #fff; font-size: 24px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="menu-screen" class="overlay">
        <h1>CyberJump</h1>
        <button id="play-btn" class="menu-btn">ENTER THE CHAOS</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="mobile-controls" class="hide">
        <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 600;

    let gameActive = false, score = 0;
    let player = { x: 200, y: 500, width: 26, height: 36, vx: 0, vy: 0, gravity: 0.46 };
    let missiles = [];
    let keys = { left: false, right: false };

    // Spawn missiles
    setInterval(() => {
        if(gameActive && score > 2000) {
            missiles.push({ x: 400, y: Math.random() * 500, speed: 7, warning: 60 });
        }
    }, 2500);

    function update() {
        if (!gameActive) return;
        if (keys.left) player.vx = -5; else if (keys.right) player.vx = 5; else player.vx *= 0.8;
        player.x += player.vx; player.y += player.vy;
        
        missiles.forEach(m => {
            if (m.warning > 0) m.warning--;
            else m.x -= m.speed;
        });
        missiles = missiles.filter(m => m.x > -50);
        score++;
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 600);
        ctx.fillStyle = '#45f3ff';
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        missiles.forEach(m => {
            if (m.warning > 0) {
                ctx.fillStyle = 'red';
                ctx.fillText("! WARNING !", 300, m.y);
            } else {
                ctx.fillStyle = 'orange';
                ctx.fillRect(m.x, m.y, 40, 10);
            }
        });

        if (gameActive) {
            update();
            requestAnimationFrame(draw);
        }
    }

    document.getElementById('btn-left').addEventListener('touchstart', () => keys.left = true);
    document.getElementById('btn-left').addEventListener('touchend', () => keys.left = false);
    document.getElementById('btn-right').addEventListener('touchstart', () => keys.right = true);
    document.getElementById('btn-right').addEventListener('touchend', () => keys.right = false);

    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('menu-screen').classList.add('hide');
        document.getElementById('mobile-controls').classList.remove('hide');
        gameActive = true;
        draw();
    });
</script>
</body>
</html>
