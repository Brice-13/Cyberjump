<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: MAYHEM FIXED</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: #ecf0f1; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100vh; max-height: 700px; border: 4px solid #45f3ff; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        canvas { width: 100%; flex-grow: 1; display: block; background: #000; }
        .menu-btn { background: transparent; border: 2px solid #45f3ff; color: #45f3ff; padding: 15px 30px; cursor: pointer; width: 80%; font-family: inherit; font-size: 1.2rem; margin-top: 20px; }
        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 5; }
        .ctrl-btn { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; background: rgba(255,255,255,0.1); color: #fff; font-size: 30px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="menu-screen" class="overlay">
        <h1>CyberJump</h1>
        <button id="play-btn" class="menu-btn">ENTER THE CHAOS</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="mobile-controls">
        <button id="btn-left" class="ctrl-btn">◀</button>
        <button id="btn-right" class="ctrl-btn">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 600;

    let gameActive = false;
    let player = { x: 187, y: 400, w: 26, h: 36, vx: 0, vy: 0, grav: 0.5, jump: -12 };
    let platforms = [{x: 100, y: 500, w: 200, h: 10}, {x: 50, y: 350, w: 200, h: 10}, {x: 150, y: 200, w: 200, h: 10}];
    let missiles = [];
    let keys = { left: false, right: false };

    // Input
    window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') keys.left=true; if(e.key==='ArrowRight') keys.right=true; });
    window.addEventListener('keyup', e => { if(e.key==='ArrowLeft') keys.left=false; if(e.key==='ArrowRight') keys.right=false; });
    document.getElementById('btn-left').addEventListener('touchstart', () => keys.left = true);
    document.getElementById('btn-left').addEventListener('touchend', () => keys.left = false);
    document.getElementById('btn-right').addEventListener('touchstart', () => keys.right = true);
    document.getElementById('btn-right').addEventListener('touchend', () => keys.right = false);

    // Missile Spawner
    setInterval(() => {
        if(gameActive) missiles.push({ x: 400, y: Math.random() * 400, speed: 7, warn: 60 });
    }, 2000);

    function loop() {
        if (!gameActive) return;

        // Physics
        player.vx = keys.left ? -5 : keys.right ? 5 : 0;
        player.x += player.vx;
        player.vy += player.grav;
        player.y += player.vy;

        // Collision
        platforms.forEach(p => {
            if (player.vy > 0 && player.x + player.w > p.x && player.x < p.x + p.w && 
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                player.vy = player.jump;
            }
        });

        // Wrap
        if (player.x > 400) player.x = -player.w; else if (player.x < -player.w) player.x = 400;

        // Missiles
        missiles.forEach(m => { if(m.warn > 0) m.warn--; else m.x -= m.speed; });

        // Draw
        ctx.clearRect(0, 0, 400, 600);
        ctx.fillStyle = '#45f3ff';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#00ff55';
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        missiles.forEach(m => {
            ctx.fillStyle = m.warn > 0 ? 'red' : 'orange';
            if(m.warn > 0) ctx.fillText("! WARNING !", 300, m.y);
            else ctx.fillRect(m.x, m.y, 40, 10);
        });

        requestAnimationFrame(loop);
    }

    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('menu-screen').style.display = 'none';
        gameActive = true;
        loop();
    });
</script>
</body>
</html>
