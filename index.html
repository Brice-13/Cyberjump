<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: Stickman Evolution</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ecf0f1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 700px;
            border: 4px solid #45f3ff;
            border-radius: 10px;
            box-shadow: 0 0 20px #45f3ff44;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #mobile-controls {
            position: absolute;
            bottom: 50px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
        }

        #mobile-controls button {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background-color: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            cursor: pointer;
        }

        #mobile-controls button:active {
            background-color: rgba(0, 255, 204, 0.5);
            color: #fff;
        }

        canvas {
            width: 100%;
            flex-grow: 1;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 2.3rem;
            color: #45f3ff;
            text-shadow: 0 0 10px #45f3ff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #66fcf1;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .menu-btn {
            background: transparent;
            border: 2px solid #45f3ff;
            color: #45f3ff;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
            margin: 10px 0;
            width: 80%;
        }

        .menu-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            box-shadow: 0 0 15px #45f3ff;
        }

        .stats-box {
            border: 1px solid #1f2833;
            background: #0f141c;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 80%;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- MAIN MENU -->
    <div id="menu-screen" class="overlay">
        <h1>CyberJump</h1>
        <div class="subtitle">// Evolutionary Timeline Matrix Online //</div>
        
        <div class="stats-box">
            <div>PEAK ALTITUDE: <span id="high-score-val">0</span></div>
            <div style="margin-top: 5px;">CHIPS VALUE: <span id="chips-total-val" style="color:#66fcf1;">0</span></div>
        </div>

        <button id="play-btn" class="menu-btn">INITIATE GENERATION GAUNTLET</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="overlay hide">
        <h1 style="color: #ff4545; text-shadow: 0 0 10px #ff4545;">DESYNCHRONIZED</h1>
        <div class="subtitle">Timeline connection fractured in mid-air.</div>
        
        <div class="stats-box">
            <div>FINAL ALTITUDE: <span id="final-score-val">0</span></div>
            <div>TOTAL CHIPS SECURED: <span id="collected-chips-val" style="color:#66fcf1;">0</span></div>
        </div>

        <button id="retry-btn" class="menu-btn">RESPAWN SYSTEM</button>
    </div>

    <!-- Canvas Game Port -->
    <canvas id="gameCanvas"></canvas>

    <!-- Mobile Touch Controls -->
    <div id="mobile-controls" class="hide">
        <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 400;
    canvas.height = 600;

    // Game state variables
    let gameActive = false;
    let score = 0;
    let totalChips = parseInt(localStorage.getItem('cyberjump_chips')) || 0;
    let highScore = parseInt(localStorage.getItem('cyberjump_highscore')) || 0;
    
    // Stiff Atari Pixel Matrix
    const atariMatrix = [
        "...XX...",
        "..XXXX..",
        "..X..X..",
        ".XXXXXX.",
        "XX.XX.XX",
        "..XXXX..",
        "..X..X..",
        ".XX..XX."
    ];

    // Player Physics Properties
    const player = {
        x: canvas.width / 2 - 14,
        y: canvas.height - 100,
        width: 26, 
        height: 36,
        vx: 0,
        vy: 0,
        speed: 5.8,
        jumpForce: -13.2, 
        gravity: 0.46,
        rotation: 0,
        color: '#45f3ff'
    };

    let platforms = [];
    let items = [];
    let backgroundBuildings = []; 
    let cameraY = 0; 
    let basePlatformY = canvas.height - 40;

    // --- RE-BALANCED TEMPORAL THRESHOLDS ---
    const ERA_2_START = 8000;  
    const ERA_3_START = 25000; 

    let currentEra = 1; 
    let previousEra = 1;
    let eraLeapTimer = 0; 
    let screenShake = 0; 

    // Controls tracking
    const keys = { left: false, right: false };

    function initBuildings() {
        backgroundBuildings = [];
        for (let i = 0; i < 8; i++) {
            backgroundBuildings.push({
                x: i * 60 + Math.random() * 20,
                y: Math.random() * 300 + 300,
                width: Math.random() * 30 + 40,
                height: 400,
                speedFactor: 0.15 
            });
        }
    }

    function updateStatsUI() {
        document.getElementById('high-score-val').textContent = highScore;
        document.getElementById('chips-total-val').textContent = totalChips;
    }

    // Keyboard bindings
    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
    });

    // Touch bindings
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');
    function simulateKey(type, keyName) {
        window.dispatchEvent(new KeyboardEvent(type, { key: keyName }));
    }
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); simulateKey('keydown', 'ArrowLeft'); });
    btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); simulateKey('keyup', 'ArrowLeft'); });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); simulateKey('keydown', 'ArrowRight'); });
    btnRight.addEventListener('touchend', (e) => { e.preventDefault(); simulateKey('keyup', 'ArrowRight'); });

    // Procedural Platforms Generator
    function generatePlatforms(startY, count) {
        let y = startY;
        for (let i = 0; i < count; i++) {
            y -= Math.floor(Math.random() * 45) + 75; 
            
            let width = Math.max(45, 100 - (score / 400)); 
            let x = Math.random() * (canvas.width - width);
            
            let movementSpeed = 0;
            if (score >= ERA_2_START) {
                movementSpeed = (Math.random() - 0.5) * (1.8 + (score / 20000));
            }

            platforms.push({ x, y, width, height: 10, vx: movementSpeed });

            if (Math.random() < 0.25) {
                items.push({
                    x: x + width / 2 - 6,
                    y: y - 22,
                    width: 12,
                    height: 12,
                    collected: false
                });
            }
        }
    }

    function initGame() {
        score = 0;
        cameraY = 0;
        platforms = [];
        items = [];
        currentEra = 1;
        previousEra = 1;
        eraLeapTimer = 0;
        screenShake = 0;
        player.rotation = 0;
        
        initBuildings();

        platforms.push({ x: 0, y: basePlatformY, width: canvas.width, height: 40, vx: 0 });
        generatePlatforms(canvas.height - 80, 22);

        player.x = canvas.width / 2 - 13;
        player.y = canvas.height - 120;
        player.vx = 0;
        player.vy = 0;

        gameActive = true;
        document.getElementById('mobile-controls').classList.remove('hide');
        updateStatsUI();
        gameLoop();
    }

    function update() {
        if (!gameActive) return;

        if (keys.left) player.vx = -player.speed;
        else if (keys.right) player.vx = player.speed;
        else player.vx *= 0.76; 

        player.x += player.vx;
        player.vy += player.gravity;
        player.y += player.vy;

        if (player.x + player.width < 0) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.width;

        // Animation calculations
        if (currentEra === 1) {
            player.rotation = 0; 
        } 
        else if (currentEra === 2) {
            player.rotation = player.vx * 0.04;
        } 
        else {
            player.rotation += 0.08 + (Math.abs(player.vy) * 0.01);
        }

        // Camera loops
        if (player.y < canvas.height / 2) {
            let diff = (canvas.height / 2) - player.y;
            cameraY += diff;
            player.y += diff;
            
            platforms.forEach(p => p.y += diff);
            items.forEach(it => it.y += diff);

            if (currentEra === 3) {
                backgroundBuildings.forEach(b => {
                    b.y += diff * b.speedFactor;
                    if (b.y > canvas.height + 100) {
                        b.y = -150;
                        b.x = Math.random() * (canvas.width - b.width);
                    }
                });
            }
            
            score += Math.floor(diff);
        }

        // Move active platforms
        platforms.forEach(p => {
            if (p.vx !== 0) {
                p.x += p.vx;
                if (p.x <= 0 || p.x + p.width >= canvas.width) {
                    p.vx *= -1; 
                }
            }
        });

        // Current Era tracking
        if (score < ERA_2_START) currentEra = 1;
        else if (score >= ERA_2_START && score < ERA_3_START) currentEra = 2;
        else currentEra = 3;

        if (currentEra !== previousEra) {
            eraLeapTimer = 130; 
            screenShake = 30; 
            previousEra = currentEra;
        }

        if (screenShake > 0) screenShake *= 0.92;
        if (eraLeapTimer > 0) eraLeapTimer--;

        // Collision logic
        platforms.forEach(platform => {
            if (
                player.vy > 0 && 
                player.x + player.width > platform.x &&
                player.x < platform.x + platform.width &&
                player.y + player.height >= platform.y &&
                player.y + player.height <= platform.y + 12
            ) {
                player.y = platform.y - player.height;
                player.vy = player.jumpForce; 
            }
        });

        items.forEach(item => {
            if (!item.collected && 
                player.x < item.x + item.width &&
                player.x + player.width > item.x &&
                player.y < item.y + item.height &&
                player.y + player.height > item.y
            ) {
                item.collected = true;
                totalChips += 2;
                localStorage.setItem('cyberjump_chips', totalChips);
                updateStatsUI();
            }
        });

        platforms = platforms.filter(p => p.y < canvas.height + 50);
        items = items.filter(it => it.y < canvas.height + 50 && !it.collected);

        if (platforms.length < 15) {
            let highestPlatformY = Math.min(...platforms.map(p => p.y));
            generatePlatforms(highestPlatformY, 15);
        }

        if (player.y > canvas.height) endGame();
    }

    function drawStickman(renderCtx, x, y, width, height, era, rotationAngle, color) {
        renderCtx.save();
        renderCtx.translate(x + width / 2, y + height / 2);
        renderCtx.rotate(rotationAngle);

        renderCtx.strokeStyle = color;
        renderCtx.fillStyle = color;
        renderCtx.lineWidth = era === 3 ? 3.5 : 2;

        if (era === 2) {
            renderCtx.strokeRect(-5, -16, 10, 10);
            renderCtx.beginPath();
            renderCtx.moveTo(0, -6);
            renderCtx.lineTo(0, 6);
            renderCtx.moveTo(-10, -3);
            renderCtx.lineTo(10, -3);
            renderCtx.moveTo(0, 6);
            renderCtx.lineTo(-8, 16);
            renderCtx.moveTo(0, 6);
            renderCtx.lineTo(8, 16);
            renderCtx.stroke();
        } 
        else if (era === 3) {
            renderCtx.shadowColor = color;
            renderCtx.shadowBlur = 12;

            renderCtx.beginPath();
            renderCtx.arc(0, -14, 5, 0, Math.PI * 2);
            renderCtx.fill();

            renderCtx.beginPath();
            renderCtx.moveTo(0, -9);
            renderCtx.lineTo(0, 5);

            let legSway = Math.sin(Date.now() * 0.015) * 6;
            renderCtx.moveTo(0, -6);
            renderCtx.lineTo(-11, -2 + (player.vy * 0.3));
            renderCtx.moveTo(0, -6);
            renderCtx.lineTo(11, -2 - (player.vy * 0.3));

            renderCtx.moveTo(0, 5);
            renderCtx.lineTo(-7 + legSway, 16);
            renderCtx.moveTo(0, 5);
            renderCtx.lineTo(7 - legSway, 16);
            renderCtx.stroke();
        }
        renderCtx.restore();
    }

    function draw() {
        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (currentEra === 1) {
            ctx.fillStyle = '#030703';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0, 255, 60, 0.04)';
            for (let i = 0; i < canvas.height; i += 4) ctx.fillRect(0, i, canvas.width, 1.5);
        } 
        else if (currentEra === 2) {
            ctx.fillStyle = '#0a2240';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let x = 0; x < canvas.width; x += 25) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += 25) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
        } 
        else {
            let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#0c0214');
            skyGrad.addColorStop(1, '#24042b');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            backgroundBuildings.forEach(b => {
                ctx.fillStyle = '#140321';
                ctx.strokeStyle = '#ff00aa';
                ctx.lineWidth = 1.5;
                ctx.shadowColor = '#ff00aa';
                ctx.shadowBlur = 5;
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.strokeRect(b.x, b.y, b.width, b.height);
            });
            ctx.shadowBlur = 0;
        }

        if (eraLeapTimer > 105) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Render Platforms
        platforms.forEach(p => {
            if (currentEra === 1) {
                ctx.fillStyle = '#00ff55';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            } else if (currentEra === 2) {
                ctx.fillStyle = 'transparent';
                ctx.strokeStyle = '#ffffff'; 
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.width, p.height);
            } else {
                ctx.fillStyle = '#0a0112';
                ctx.strokeStyle = '#45f3ff';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#45f3ff';
                ctx.shadowBlur = 8;
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.strokeRect(p.x, p.y, p.width, p.height);
                ctx.shadowBlur = 0;
            }
        });

        // Render Items
        items.forEach(it => {
            if (!it.collected) {
                ctx.fillStyle = currentEra === 1 ? '#00ff55' : currentEra === 2 ? '#ffffff' : '#ffea00';
                if (currentEra === 3) { ctx.shadowColor = '#ffea00'; ctx.shadowBlur = 8; }
                ctx.fillRect(it.x, it.y, it.width, it.height);
                ctx.shadowBlur = 0;
            }
        });

        // Render Character
        if (currentEra === 1) {
            const rows = atariMatrix.length;
            const cols = atariMatrix[0].length;
            const pW = player.width / cols;
            const pH = player.height / rows;
            ctx.fillStyle = player.color;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (atariMatrix[r][c] === 'X') {
                        ctx.fillRect(player.x + (c * pW), player.y + (r * pH), pW - 0.5, pH - 0.5);
                    }
                }
            }
        } else {
            drawStickman(ctx, player.x, player.y, player.width, player.height, currentEra, player.rotation, player.color);
        }

        // Notification Alerts
        ctx.textAlign = 'center';
        ctx.shadowColor = '#000000';
        ctx.shadowBlur = 4;

        if (eraLeapTimer > 0) {
            ctx.fillStyle = '#ff0055';
            ctx.font = 'bold 22px "Courier New"';
            ctx.fillText("⚠️ TIMELINE RIFT DETECTED ⚠️", canvas.width / 2, canvas.height / 2.5);
            ctx.fillStyle = '#66fcf1';
            ctx.font = '13px "Courier New"';
            let msg = currentEra === 2 ? "LOADING ERA_2: BLUEPRINT MATRIX" : "LOADING ERA_3: URBAN VECTOR CORES";
            ctx.fillText(msg, canvas.width / 2, (canvas.height / 2.5) + 26);
        }
        ctx.shadowBlur = 0;

        // HUD Panels
        ctx.fillStyle = '#ecf0f1';
        ctx.font = 'bold 16px "Courier New"';
        ctx.textAlign = 'left';
        ctx.fillText(`ALTITUDE: ${score}`, 15, 30);
        ctx.fillStyle = '#ffe400';
        ctx.fillText(`CHIPS: ${totalChips}`, 15, 55);

        ctx.textAlign = 'right';
        ctx.fillStyle = currentEra === 1 ? '#00ff55' : currentEra === 2 ? '#ffffff' : '#ff00aa';
        let eraLabel = currentEra === 1 ? "1980 // ATARI" : currentEra === 2 ? "1995 // BLUEPRINT" : "2026 // VECTOR";
        ctx.fillText(eraLabel, canvas.width - 15, 30);

        ctx.restore();
    }

    function gameLoop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    function endGame() {
        gameActive = false;
        document.getElementById('mobile-controls').classList.add('hide');
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('cyberjump_highscore', highScore);
        }
        document.getElementById('final-score-val').textContent = score;
        document.getElementById('collected-chips-val').textContent = totalChips;
        document.getElementById('gameover-screen').classList.remove('hide');
    }

    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('menu-screen').classList.add('hide');
        initGame();
    });
    document.getElementById('retry-btn').addEventListener('click', () => {
        document.getElementById('gameover-screen').classList.add('hide');
        initGame();
    });

    updateStatsUI();
</script>
</body>
    </html>
