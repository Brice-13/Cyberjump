<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberJump: MAYHEM EDITION</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: #ecf0f1; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        #game-container { position: relative; width: 100%; max-width: 400px; height: 100vh; max-height: 700px; border: 4px solid #45f3ff; border-radius: 10px; box-shadow: 0 0 20px #45f3ff44; display: flex; flex-direction: column; overflow: hidden; }
        #mobile-controls { position: absolute; bottom: 40px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 100; }
        #mobile-controls button { width: 75px; height: 75px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.4); background-color: rgba(0, 0, 0, 0.7); color: #00ffcc; font-size: 32px; font-weight: bold; cursor: pointer; }
        canvas { width: 100%; flex-grow: 1; display: block; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 5, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; z-index: 10; }
        h1 { font-size: 2.3rem; color: #45f3ff; text-shadow: 0 0 10px #45f3ff; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: #66fcf1; font-size: 0.85rem; margin-bottom: 20px; }
        .menu-btn { background: transparent; border: 2px solid #45f3ff; color: #45f3ff; padding: 10px 25px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; margin: 6px 0; width: 85%; }
        .stats-box { border: 1px solid #1f2833; background: #0f141c; padding: 12px; border-radius: 5px; margin-bottom: 12px; width: 85%; }
        .leaderboard-title { font-size: 0.85rem; color: #ffe400; margin-top: 10px; }
        .leaderboard-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #aaa; padding: 3px 10px; }
        .hide { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-screen" class="overlay">
        <h1>CyberJump</h1>
        <div class="subtitle">// MAYHEM ENGINE ACTIVE //</div>
        <div class="stats-box">
            <div>PEAK ALTITUDE: <span id="high-score-val">0</span></div>
            <div id="leaderboard-board"></div>
        </div>
        <button id="play-btn" class="menu-btn">ENTER THE CHAOS</button>
    </div>

    <div id="save-screen" class="overlay hide">
        <h1 style="color: #ff3333;">MISSILE IMPACT</h1>
        <button id="reboot-btn" class="menu-btn" style="border-color: #ffe400;">PATCH TIMELINE</button>
    </div>

    <div id="gameover-screen" class="overlay hide">
        <h1>DESYNCHRONIZED</h1>
        <button id="retry-btn" class="menu-btn">RESPAWN SYSTEM</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div id="mobile-controls" class="hide">
        <button id="btn-left">◀</button>
        <button id="btn-right">▶</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 600;

    let gameActive = false, score = 0, totalChips = parseInt(localStorage.getItem('cyberjump_chips')) || 1000;
    let player = { x: 200, y: 500, width: 26, height: 36, vx: 0, vy: 0, gravity: 0.46, hasShield: false };
    let platforms = [], items = [], missiles = [];
    let keys = { left: false, right: false };

    // --- MAYHEM SYSTEMS ---
    function spawnMissile() {
        if (!gameActive || score < 5000) return;
        missiles.push({ x: 400, y: Math.random() * 500, speed: 8 + (score/10000), warned: false, warningTimer: 60 });
    }

    setInterval(spawnMissile, 3000);

    function update() {
        if (!gameActive) return;

        // Physics/Input
        if (keys.left) player.vx = -5.8; else if (keys.right) player.vx = 5.8; else player.vx *= 0.76;
        player.x += player.vx; player.vy += player.gravity; player.y += player.vy;
        
        // Missile Logic
        missiles.forEach(m => {
            if (m.warningTimer > 0) {
                m.warningTimer--;
            } else {
                m.x -= m.speed;
            }
        });
        missiles = missiles.filter(m => m.x > -50);

        // Collision logic here...
        if (player.y > 600) triggerSaveScreen();
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 600);
        
        // Render Missiles
        missiles.forEach(m => {
            if (m.warningTimer > 0) {
                ctx.fillStyle = 'red';
                ctx.font = '20px Arial';
                ctx.fillText("! WARNING !", 300, m.y);
            } else {
                ctx.fillStyle = 'orange';
                ctx.fillRect(m.x, m.y, 40, 10);
            }
        });

        requestAnimationFrame(update);
        requestAnimationFrame(draw);
    }

    // Input handlers
    document.getElementById('btn-left').addEventListener('touchstart', () => keys.left = true);
    document.getElementById('btn-left').addEventListener('touchend', () => keys.left = false);
    document.getElementById('btn-right').addEventListener('touchstart', () => keys.right = true);
    document.getElementById('btn-right').addEventListener('touchend', () => keys.right = false);

    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('menu-screen').classList.add('hide');
        gameActive = true;
        update(); draw();
    });

    function triggerSaveScreen() { gameActive = false; document.getElementById('save-screen').classList.remove('hide'); }
</script>
</body>
</html>
